<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a1a"/>
      <stop offset="100%" stop-color="#080e08"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecb4e"/>
      <stop offset="100%" stop-color="#267326"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <!-- T in green gradient -->
  <text x="1" y="23" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="23" fill="url(#tg)">T</text>
  <!-- P in silver -->
  <text x="15" y="23" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="23" fill="#a0bca0">P</text>
  <!-- Grass blades under the T -->
  <line x1="4"  y1="29" x2="3"  y2="25" stroke="#2d8a2d" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7"  y1="29" x2="7"  y2="24" stroke="#3bae3b" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="10" y1="29" x2="11" y2="25" stroke="#2d8a2d" stroke-width="1.2" stroke-linecap="round"/>
</svg>
